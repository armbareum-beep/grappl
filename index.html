  <script>
    // ============================================
    // 🔥 강제 캐시 클리어 (버전이 바뀌면 실행)
    // 세션당 1회만 실행하여 무한 루프 방지
    // ============================================
    (function() {
      var CACHE_BUST_VERSION = '20260227_v1'; // 배포할 때마다 이 값을 변경
      var CACHE_KEY = 'grapplay_cache_version';
      var SESSION_RELOAD_KEY = 'grapplay_session_reloaded';

      try {
        // 🛡️ 세션 내 중복 리로드 방지 - sessionStorage 사용
        var sessionReloaded = sessionStorage.getItem(SESSION_RELOAD_KEY);
        if (sessionReloaded === 'true') {
          console.log('[CacheBust] Already reloaded this session, skipping');
          return;
        }

        var savedVersion = localStorage.getItem(CACHE_KEY);

        if (savedVersion !== CACHE_BUST_VERSION) {
          console.log('[CacheBust] New version detected:', CACHE_BUST_VERSION, '(was:', savedVersion, ')');

          // 즉시 버전 저장 및 세션 플래그 설정 (무한 루프 방지)
          localStorage.setItem(CACHE_KEY, CACHE_BUST_VERSION);
          sessionStorage.setItem(SESSION_RELOAD_KEY, 'true');

          // Service Worker 해제 및 캐시 삭제 (비동기, 논블로킹)
          var clearPromises = [];

          // 1. Service Worker 해제
          if ('serviceWorker' in navigator) {
            clearPromises.push(
              navigator.serviceWorker.getRegistrations().then(function(regs) {
                return Promise.all(regs.map(function(reg) {
                  console.log('[CacheBust] Unregistering SW:', reg.scope);
                  return reg.unregister();
                }));
              }).catch(function(e) { console.warn('[CacheBust] SW error:', e); })
            );
          }

          // 2. Cache Storage 삭제
          if ('caches' in window) {
            clearPromises.push(
              caches.keys().then(function(keys) {
                return Promise.all(keys.map(function(key) {
                  console.log('[CacheBust] Deleting cache:', key);
                  return caches.delete(key);
                }));
              }).catch(function(e) { console.warn('[CacheBust] Cache error:', e); })
            );
          }

          // 캐시 클리어 후 리로드 (한 번만)
          Promise.all(clearPromises).then(function() {
            console.log('[CacheBust] Cache cleared, reloading once...');
            setTimeout(function() {
              window.location.reload();
            }, 300);
          });

          return;
        }
      } catch(e) {
        console.warn('[CacheBust] Error:', e);
      }
    })();

    // 핀치 줌 비활성화 (두 손가락 확대 방지)
    document.addEventListener('touchstart', function (event) {
      if (event.touches.length > 1) {
        event.preventDefault();
      }
    }, { passive: false });

    // 더블 탭 줌 비활성화 및 제스처 줌 방지
    let lastTouchEnd = 0;
    document.addEventListener('touchend', function (event) {
      let now = (new Date()).getTime();
      if (now - lastTouchEnd <= 300) {
        event.preventDefault();
      }
      lastTouchEnd = now;
    }, false);

    // Safari 제스처 방지
    document.addEventListener('gesturestart', function (event) {
      event.preventDefault();
    });
  </script>
