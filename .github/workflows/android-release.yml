name: Android Release AAB

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release-aab:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x mobile/gradlew

      - name: Decode keystore from secret
        run: |
          mkdir -p mobile/keystore
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > mobile/keystore/grapplay-release.jks

      - name: Build signed release AAB
        working-directory: mobile
        env:
          ANDROID_KEYSTORE_PATH: ../keystore/grapplay-release.jks
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :composeApp:bundleRelease

      - name: Rename AAB
        run: |
          mv mobile/composeApp/build/outputs/bundle/release/composeApp-release.aab \
             mobile/composeApp/build/outputs/bundle/release/grapplay-${{ github.ref_name }}.aab

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Grapplay ${{ github.ref_name }}
          files: mobile/composeApp/build/outputs/bundle/release/grapplay-${{ github.ref_name }}.aab
          generate_release_notes: true

      - name: Clean up keystore
        if: always()
        run: rm -f mobile/keystore/grapplay-release.jks
