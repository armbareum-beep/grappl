name: Android APK Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x mobile/gradlew

      - name: Build debug APK
        working-directory: mobile
        run: ./gradlew :composeApp:assembleDebug

      - name: Rename APK
        run: |
          mv mobile/composeApp/build/outputs/apk/debug/composeApp-debug.apk \
             mobile/composeApp/build/outputs/apk/debug/grapplay-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Grapplay ${{ github.ref_name }}
          files: mobile/composeApp/build/outputs/apk/debug/grapplay-${{ github.ref_name }}.apk
          generate_release_notes: true
