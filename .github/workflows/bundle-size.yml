name: Bundle Size Guard

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  bundle-size:
    name: Check Bundle Size
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and analyze
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Get bundle sizes
        id: bundle
        run: |
          # Get main JS bundle size (index-*.js)
          MAIN_BUNDLE=$(find dist/assets -name 'index-*.js' -exec stat -c%s {} \; | head -1)
          MAIN_BUNDLE_KB=$((MAIN_BUNDLE / 1024))
          echo "main_bundle_kb=$MAIN_BUNDLE_KB" >> $GITHUB_OUTPUT

          # Get total JS size
          TOTAL_JS=$(find dist/assets -name '*.js' -exec stat -c%s {} + | awk '{s+=$1} END {print s}')
          TOTAL_JS_KB=$((TOTAL_JS / 1024))
          echo "total_js_kb=$TOTAL_JS_KB" >> $GITHUB_OUTPUT

          # Get total CSS size
          TOTAL_CSS=$(find dist/assets -name '*.css' -exec stat -c%s {} + | awk '{s+=$1} END {print s}')
          TOTAL_CSS_KB=$((TOTAL_CSS / 1024))
          echo "total_css_kb=$TOTAL_CSS_KB" >> $GITHUB_OUTPUT

          # Get total dist size
          TOTAL_DIST=$(du -sb dist | cut -f1)
          TOTAL_DIST_KB=$((TOTAL_DIST / 1024))
          echo "total_dist_kb=$TOTAL_DIST_KB" >> $GITHUB_OUTPUT

          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Main Bundle | ${MAIN_BUNDLE_KB} KB |" >> $GITHUB_STEP_SUMMARY
          echo "| Total JS | ${TOTAL_JS_KB} KB |" >> $GITHUB_STEP_SUMMARY
          echo "| Total CSS | ${TOTAL_CSS_KB} KB |" >> $GITHUB_STEP_SUMMARY
          echo "| Total Dist | ${TOTAL_DIST_KB} KB |" >> $GITHUB_STEP_SUMMARY

      - name: Check size limits
        run: |
          MAIN_KB=${{ steps.bundle.outputs.main_bundle_kb }}
          TOTAL_JS_KB=${{ steps.bundle.outputs.total_js_kb }}

          # Limits (adjust as needed)
          MAIN_LIMIT=800    # 800KB for main bundle
          TOTAL_LIMIT=2000  # 2MB for total JS

          FAILED=false

          if [ "$MAIN_KB" -gt "$MAIN_LIMIT" ]; then
            echo "::error::Main bundle (${MAIN_KB}KB) exceeds limit (${MAIN_LIMIT}KB)"
            FAILED=true
          else
            echo "✅ Main bundle: ${MAIN_KB}KB (limit: ${MAIN_LIMIT}KB)"
          fi

          if [ "$TOTAL_JS_KB" -gt "$TOTAL_LIMIT" ]; then
            echo "::error::Total JS (${TOTAL_JS_KB}KB) exceeds limit (${TOTAL_LIMIT}KB)"
            FAILED=true
          else
            echo "✅ Total JS: ${TOTAL_JS_KB}KB (limit: ${TOTAL_LIMIT}KB)"
          fi

          if [ "$FAILED" = true ]; then
            exit 1
          fi

      - name: Comment PR with size
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const mainKb = '${{ steps.bundle.outputs.main_bundle_kb }}';
            const totalJs = '${{ steps.bundle.outputs.total_js_kb }}';
            const totalCss = '${{ steps.bundle.outputs.total_css_kb }}';
            const totalDist = '${{ steps.bundle.outputs.total_dist_kb }}';

            const body = `## 📦 Bundle Size Report

            | Metric | Size |
            |--------|------|
            | Main Bundle | ${mainKb} KB |
            | Total JS | ${totalJs} KB |
            | Total CSS | ${totalCss} KB |
            | Total Dist | ${totalDist} KB |

            <details>
            <summary>Size Limits</summary>

            - Main Bundle: 800 KB max
            - Total JS: 2,000 KB max
            </details>`;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Bundle Size Report')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
