version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "automated"
    ignore:
      # Major version updates - review manually
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
    groups:
      # Group minor/patch updates together
      react-ecosystem:
        patterns:
          - "react*"
          - "@types/react*"
      supabase:
        patterns:
          - "@supabase/*"
      tanstack:
        patterns:
          - "@tanstack/*"
      mux:
        patterns:
          - "@mux/*"
      vite-plugins:
        patterns:
          - "vite-*"
          - "@vitejs/*"
      types:
        patterns:
          - "@types/*"
        exclude-patterns:
          - "@types/react*"
      eslint:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "@typescript-eslint/*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "ci"
    labels:
      - "github-actions"
      - "automated"
